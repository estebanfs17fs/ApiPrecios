version: "3.9"

services:
  api:
    build: .
    container_name: precios-uy-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/precios_uy.db
    volumes:
      - api_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/supermercados')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  api_data:
